<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="Analyse mutual fund overlap, sector risk, and get AI-powered insights for your portfolio." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'ui-sans-serif', 'system-ui', '-apple-system', 'sans-serif'] },
          colors: {
            surface: { base: '#0a0a0b', raised: '#141415', overlay: '#1a1a1c' },
          },
          animation: {
            spotlight: 'spotlight 2s ease .75s 1 forwards',
          },
          keyframes: {
            spotlight: {
              '0%': { opacity: '0', transform: 'translate(-72%, -62%) scale(0.5)' },
              '100%': { opacity: '1', transform: 'translate(-50%, -40%) scale(1)' },
            },
          },
        },
      },
    };
  </script>
  <title>MF Portfolio Analyzer</title>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
